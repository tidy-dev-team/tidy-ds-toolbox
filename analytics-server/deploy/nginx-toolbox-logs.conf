# Reverse proxy for the usage-analytics ingest service (issue #42).
#
# Install as /etc/nginx/sites-available/toolbox-logs, symlink into
# sites-enabled/, AND add an explicit `include /etc/nginx/sites-enabled/toolbox-logs;`
# line to nginx.conf — this box lists vhosts individually and does NOT use
# `include sites-enabled/*`, so the symlink alone is never loaded.
#
# Issue the cert with `certbot certonly --nginx -d toolbox-logs.wearekido.dev`
# BEFORE first enabling this file, so the cert paths below resolve. Do NOT use
# plain `certbot --nginx` (the installer): on this box it injected the server
# blocks into an unrelated vhost and turned the 443 block into a
# `return 301 https://$host$request_uri` on the SSL listener — an infinite
# HTTPS->HTTPS redirect loop.

server {
    listen 80;
    listen [::]:80;
    server_name toolbox-logs.wearekido.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name toolbox-logs.wearekido.dev;

    ssl_certificate     /etc/letsencrypt/live/toolbox-logs.wearekido.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbox-logs.wearekido.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Batches are tiny (<=10 events); keep the accepted body small.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
