# Reverse proxy for the usage-analytics ingest service (issue #42).
# Install to /etc/nginx/sites-available/toolbox-logs.wearekido.dev and symlink
# into sites-enabled/. This is the HTTP-only block; `certbot --nginx` will add
# the `listen 443 ssl` block, the certificate lines, and the HTTP->HTTPS
# redirect, exactly as it has for the other tidyframework vhosts.

server {
    listen 80;
    listen [::]:80;
    server_name toolbox-logs.wearekido.dev;

    # Batches are tiny (<=10 events); keep the accepted body small.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
