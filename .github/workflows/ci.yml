name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Safety Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run typecheck

  mcp-smoketest:
    name: MCP Server Smoketest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install MCP server dependencies
        run: npm ci --prefix mcp-server

      - name: Bundle and smoketest the MCP server
        run: npm run mcp:smoketest

      - name: Assemble and structurally check the Claude Code plugin
        run: npm run build:plugin

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate manifest.json
        run: |
          if ! jq empty manifest.json; then
            echo "❌ Invalid manifest.json"
            exit 1
          fi
          echo "✅ manifest.json is valid"

      - name: Check build artifacts
        run: |
          if [ ! -f "dist/code.js" ]; then
            echo "❌ dist/code.js not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ dist/index.html not found"
            exit 1
          fi
          echo "✅ Build artifacts present"

      - name: Check bundle size
        run: |
          CODE_SIZE=$(wc -c < dist/code.js)
          UI_SIZE=$(wc -c < dist/index.html)
          TOTAL_SIZE=$((CODE_SIZE + UI_SIZE))
          # The Icon Finder pHash DB dominates the UI bundle. It ships
          # gzip+base64-compressed (db/decode.ts), ~4.6MB total. 6MB leaves
          # headroom for icon growth while still catching an uncompressed
          # (~14.6MB) regression.
          MAX_SIZE=$((6 * 1024 * 1024))  # 6MB

          echo "📦 Bundle sizes:"
          echo "  code.js: $(numfmt --to=iec-i --suffix=B $CODE_SIZE)"
          echo "  index.html: $(numfmt --to=iec-i --suffix=B $UI_SIZE)"
          echo "  Total: $(numfmt --to=iec-i --suffix=B $TOTAL_SIZE)"

          if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
            echo "❌ Bundle size exceeds 6MB limit"
            exit 1
          fi
          echo "✅ Bundle size within limits"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build-${{ github.sha }}
          path: |
            dist/
            manifest.json
          retention-days: 7
